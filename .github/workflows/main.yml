name: Daily AI Influencer Content Email

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install requests pillow "opennsfw2[tf-keras]"

      - name: Generate influencer content
        run: python main.py

      - name: Send emails with attachments (smart split)
        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python send_emails.py

      - name: Upload artifacts (full original backups)
        uses: actions/upload-artifact@v6
        with:
          name: daily-influencer-drop
          path: |
            image_*.jpg
            daily_video.mp4
            caption.txt
