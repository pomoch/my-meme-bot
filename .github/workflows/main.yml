name: Daily AI Influencer Content Email

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pillow "opennsfw2[tf-keras]"

      - name: Generate influencer content
        run: python main.py

      - name: Upload artifacts (backup)
        uses: actions/upload-artifact@v6
        with:
          name: daily-influencer-drop
          path: |
            image_*.jpg
            daily_video.mp4
            caption.txt

      - name: Send email with all files
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🎭 Today's AI influencer drop is ready!"
          to: ${{ secrets.EMAIL_TO }}
          from: "AI Influencer Bot <${{ secrets.EMAIL_USERNAME }}>"
          body: |
            Hey! Your daily content is ready.

            📸 6 ultra‑sharp photos
            🎬 1 polished video
            💬 Caption inside caption.txt

            All files attached – just download and post. 🔥
          attachments: image_1.jpg,image_2.jpg,image_3.jpg,image_4.jpg,image_5.jpg,image_6.jpg,daily_video.mp4,caption.txt
