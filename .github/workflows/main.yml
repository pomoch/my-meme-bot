name: Daily AI Influencer Post

on:
  schedule:
    - cron: '0 12 * * *'   # runs every day at 12:00 UTC
  workflow_dispatch:        # lets you trigger manually

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pillow moviepy "opennsfw2[tf-keras]"

      - name: Run influencer script
        env:
          AYRSHARE_API_KEY: ${{ secrets.AYRSHARE_API_KEY }}
        run: python main.py
