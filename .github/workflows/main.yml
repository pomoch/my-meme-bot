name: Daily AI Influencer Post

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pillow moviepy google-genai "opennsfw2[tf-keras]"

      - name: Run influencer script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FANVUE_API_KEY: ${{ secrets.FANVUE_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
        run: python main.py
